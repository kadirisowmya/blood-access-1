<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard - Blood Access</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="/" class="logo"><i class="fas fa-drop"></i> Blood Access</a>
        <div class="nav-links">
            <span style="color: var(--primary); font-weight: 700; margin-right: 15px;"><i class="fas fa-user-circle"></i> <span id="navUserName"></span></span>
            <a href="/">Home</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="dashboard">
        <h2>Hospital Dashboard</h2>
        <p>Welcome, <span id="userName"></span></p>

        <div class="grid-3" style="margin-top: 30px;">
            <div class="stats-card">
                <h3>Update Blood Stock</h3>
                <form id="stockForm" style="margin-top: 15px;">
                    <div class="form-group">
                        <label>Blood Group</label>
                        <select id="bloodGroup">
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity (Units)</label>
                        <input type="number" id="quantity" required placeholder="e.g. 10">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Update Stock</button>
                </form>
            </div>

            <div class="stats-card">
                <h3 style="color: var(--primary);">Recent Blood Requests</h3>
                <div id="notificationsList" style="margin-top: 15px; max-height: 250px; overflow-y: auto;">
                    <p style="color: var(--text-muted);">No new requests yet.</p>
                </div>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <h3>Our Current Inventories</h3>
            <table class="stock-table" id="myStockTable">
                <thead><tr><th>Blood Group</th><th>Quantity</th><th>Last Updated</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (!token || role !== 'hospital') window.location.href = 'login.html';
        
        const name = localStorage.getItem('name') || 'User';
        document.getElementById('navUserName').textContent = name;
        document.getElementById('userName').innerText = name;

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        async function loadStock() {
            const res = await fetch('/api/hospital/stock', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stocks = await res.json();
            const table = document.querySelector('#myStockTable tbody');
            table.innerHTML = '';
            stocks.forEach(stock => {
                table.innerHTML += `
                    <tr>
                        <td>${stock.blood_group}</td>
                        <td>${stock.quantity}</td>
                        <td>${new Date(stock.last_updated).toLocaleString()}</td>
                    </tr>
                `;
            });
        }
        loadStock();

        document.getElementById('stockForm').onsubmit = async (e) => {
            e.preventDefault();
            const blood_group = document.getElementById('bloodGroup').value;
            const quantity = document.getElementById('quantity').value;

            const res = await fetch('/api/update-stock', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ blood_group, quantity })
            });
            const data = await res.json();
            alert(data.message || 'Stock updated');
            loadStock();
        }

        async function loadNotifications() {
            const res = await fetch('/api/notifications', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const notifications = await res.json();
            const list = document.getElementById('notificationsList');
            if (notifications.length === 0) return;
            
            list.innerHTML = '';
            notifications.forEach(n => {
                const div = document.createElement('div');
                div.style = 'background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary);';
                div.innerHTML = `
                    <p style="font-size: 0.9rem; margin-bottom: 5px;">${n.message}</p>
                    <small style="color: var(--text-muted); font-size: 0.75rem;">${new Date(n.created_at).toLocaleString()}</small>
                `;
                list.appendChild(div);
            });
        }
        loadNotifications();
        setInterval(loadNotifications, 5000);
    </script>
</body>
</html>
