<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Blood Access</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-page">
    <nav>
        <a href="/" class="logo"><i class="fas fa-microscope"></i> Admin Control</a>
        <div class="nav-links">
            <span id="adminName" style="color: var(--primary); font-weight: 700; margin-right: 20px;"></span>
            <a href="index.html" onclick="localStorage.clear()">Logout</a>
        </div>
    </nav>

    <div class="dashboard">
        <div class="stats-card" style="margin-bottom: 30px; background: #fff5f5; border: 2px solid var(--primary);">
            <h2 style="margin-bottom: 15px;"><i class="fas fa-bullhorn" style="margin-right: 10px;"></i> System Broadcast</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Send a message to every registered user in the system instantly.</p>
            <div style="display: flex; gap: 15px;">
                <input type="text" id="broadcastMsg" placeholder="Type your emergency message here..." style="flex: 1; padding: 15px; border-radius: 12px; border: 1.5px solid var(--border);">
                <button onclick="sendBroadcast()" class="btn btn-primary">Send Alert</button>
            </div>
        </div>

        <div class="stats-card">
            <h2 style="margin-bottom: 20px;">System Overview</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">Manage all registered donors, hospitals, and patients in one central location.</p>
            
            <div style="overflow-x: auto;">
                <table class="stock-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Location/Group</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Users will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        if (!token || role !== 'admin') {
            alert('Access Denied. Admins Only.');
            window.location.href = 'login.html';
        }

        document.getElementById('adminName').innerText = `Admin: ${localStorage.getItem('name')}`;

        function getRoleColor(role) {
            switch(role.toLowerCase()) {
                case 'admin': return '#333';
                case 'hospital': return '#003049';
                case 'donor': return '#d62828';
                default: return '#669bbc';
            }
        }

        async function fetchUsers() {
            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 403) {
                    alert('Forbidden: Admin access only');
                    window.location.href = 'index.html';
                    return;
                }
                
                const users = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';
                
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${user.id}</td>
                        <td><strong>${user.name}</strong></td>
                        <td>${user.email}</td>
                        <td><span style="background: ${getRoleColor(user.role)}; color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;">${user.role.toUpperCase()}</span></td>
                        <td>${user.location || '-'} (${user.blood_group || '-'})</td>
                        <td>
                            <button onclick="deleteUser(${user.id})" style="background: #ff4d4d; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error('Error fetching users:', err);
            }
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            try {
                const res = await fetch(`/api/admin/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert('User deleted successfully.');
                    fetchUsers();
                } else {
                    alert('Failed to delete user.');
                }
            } catch (err) {
                alert('An error occurred.');
            }
        }

        async function sendBroadcast() {
            const message = document.getElementById('broadcastMsg').value;
            if (!message) return alert('Please enter a message.');
            
            try {
                const res = await fetch('/api/admin/broadcast', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ message })
                });
                if (res.ok) {
                    alert('Message broadcasted to all users successfully!');
                    document.getElementById('broadcastMsg').value = '';
                } else {
                    alert('Failed to send broadcast.');
                }
            } catch (err) {
                alert('An error occurred.');
            }
        }

        fetchUsers();
    </script>
</body>
</html>
